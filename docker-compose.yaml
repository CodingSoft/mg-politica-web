services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  mg-firma-legal:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/codingsoft/mg-firma-legal:${WEBUI_DOCKER_TAG-main}
    container_name: mg-firma-legal
    volumes:
      - mg-firma-legal:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${MG_FIRMA_LEGAL_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
      - 'WEBUI_NAME=MG-Firma Legal'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  mg-firma-legal: {}
